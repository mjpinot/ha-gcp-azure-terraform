apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base

namePrefix: dev-

commonLabels:
  env: dev

# Use local or dev registry images
images:
  - name: REGISTRY/frontend
    newName: REGISTRY/frontend
    newTag: dev
  - name: REGISTRY/api
    newName: REGISTRY/api
    newTag: dev

patches:
  # 1 replica for both deployments
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment

  # Reduced resource limits for dev
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 25m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 128Mi
    target:
      kind: Deployment
      name: frontend

  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
    target:
      kind: Deployment
      name: api

  # Dev hostname
  - patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: dev.HOSTNAME
    target:
      kind: Ingress
      name: ha-ingress

  # Remove HPA in dev (single replica, no autoscaling needed)
  - patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 1
    target:
      kind: HorizontalPodAutoscaler
