apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      serviceAccountName: sa-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: api
          image: REGISTRY/api:IMAGE_TAG
          ports:
            - containerPort: 8000
          env:
            - name: DB_HOST
              # cloudnativepg primary service — same namespace is "postgres"
              value: "pg-primary-rw.postgres.svc.cluster.local"
          volumeMounts:
            - name: secrets
              mountPath: /mnt/secrets
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: secrets
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              # Set via Kustomize overlay per cloud
              secretProviderClass: CLOUD_SPC_NAME
