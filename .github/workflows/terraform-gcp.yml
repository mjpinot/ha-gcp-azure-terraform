name: Terraform — GCP

on:
  push:
    branches: [main]
    paths: ["terraform/gcp/**"]
  pull_request:
    paths: ["terraform/gcp/**"]

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_DIR: terraform/gcp

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.5"
      - name: Init
        run: terraform -chdir=$TF_DIR init -backend-config="bucket=${{ secrets.GCP_TF_STATE_BUCKET }}"
      - name: Plan
        id: plan
        run: |
          terraform -chdir=$TF_DIR plan -no-color 2>&1 | tee plan.txt
      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('plan.txt', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### Terraform Plan — GCP\n\`\`\`\n${plan.slice(-65000)}\n\`\`\``
            });

  apply:
    runs-on: ubuntu-latest
    needs: plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.5"
      - name: Init
        run: terraform -chdir=$TF_DIR init -backend-config="bucket=${{ secrets.GCP_TF_STATE_BUCKET }}"
      - name: Apply
        run: terraform -chdir=$TF_DIR apply -auto-approve
