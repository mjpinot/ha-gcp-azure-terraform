name: Apps — Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - "apps/frontend/**"
      - "apps/api/**"

permissions:
  id-token: write
  contents: read

jobs:
  build-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [frontend, api]
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "version=${{ github.sha }}" >> $GITHUB_OUTPUT

      # ── Azure Container Registry ──────────────────────────────────────────
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build & push to ACR
        run: |
          az acr build \
            --registry ${{ secrets.AZURE_ACR_NAME }} \
            --image ${{ matrix.app }}:${{ steps.meta.outputs.version }} \
            apps/${{ matrix.app }}

      # ── GCP Artifact Registry ─────────────────────────────────────────────
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build & push to Artifact Registry
        run: |
          gcloud builds submit apps/${{ matrix.app }} \
            --tag ${{ secrets.GCP_REGISTRY }}/${{ matrix.app }}:${{ steps.meta.outputs.version }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-push
    strategy:
      matrix:
        cloud: [azure, gcp]

    steps:
      - uses: actions/checkout@v4

      # Set kubeconfig per cloud
      - name: Get AKS credentials
        if: matrix.cloud == 'azure'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set AKS context
        if: matrix.cloud == 'azure'
        run: |
          az aks get-credentials \
            --resource-group ${{ secrets.AZURE_RG }} \
            --name ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Get GKE credentials
        if: matrix.cloud == 'gcp'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set GKE context
        if: matrix.cloud == 'gcp'
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER_NAME }}
          location: ${{ secrets.GCP_REGION }}

      - name: Update image tags in Kustomize overlay
        run: |
          cd k8s/overlays/${{ matrix.cloud }}
          kustomize edit set image \
            REGISTRY/frontend=:${{ needs.build-push.outputs.image_tag }} \
            REGISTRY/api=:${{ needs.build-push.outputs.image_tag }}

      - name: Apply manifests
        run: kubectl apply -k k8s/overlays/${{ matrix.cloud }}

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/frontend -n frontend --timeout=120s
          kubectl rollout status deployment/api -n api --timeout=120s
